input {
  beats {
    port => 5044
  }
}

filter {
  # JSON mode: try to parse each line as JSON; promote all keys to top level
  if [LOG_FORMAT] == "json" {
    json {
      source => "message"
      target => "parsed"
      skip_on_invalid_json => true
    }
    if [parsed] {
      ruby {
        code => '
          parsed = event.get("parsed")
          if parsed.is_a?(Hash)
            parsed.each { |k, v| event.set(k, v) }
          end
          event.remove("parsed")
          event.remove("message")
        '
      }
    }
  }
  # Ensure app_name is always set for index routing
  if ![app_name] {
    mutate { add_field => { "app_name" => "unknown" } }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "logs-%{[app_name]}-%{+YYYY.MM.dd}"
  }
}
